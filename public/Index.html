<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TRISIXATE • Scanner</title>

  <style>
    :root{
      --bg:#fffc01;
      --card:#fff;
      --text:#111;
      --muted:#666;
      --bad:#c30000;
      --good:#0a7a20;
      --shadow:0 6px 18px rgba(0,0,0,.12);
      --r:16px;
    }
    html,body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:720px;margin:0 auto;padding:16px;}
    .card{
      background:var(--card);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:14px;
      margin:12px 0;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    input{
      width:100%;
      padding:12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid #ddd;
    }
    .btn{
      padding:12px 14px;
      border-radius:12px;
      font-weight:800;
      font-size:16px;
      border:0;
      cursor:pointer;
    }
    .btn.primary{background:#111;color:#fff;}
    .btn.ghost{background:#eee;}
    .cam{border-radius:14px;overflow:hidden;background:#000;}
    video{width:100%;display:block;max-height:52vh;object-fit:cover;}
    canvas{display:none;}
    .status{margin-top:10px;font-size:14px;}
    .bad{color:var(--bad);font-weight:900;}
    .good{color:var(--good);font-weight:900;}
    .muted{color:var(--muted);}
    .mono{font-family:monospace;}
  </style>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div style="font-weight:900;font-size:18px;">TRISIXATE • Scanner</div>

    <div class="row" style="margin-top:12px;">
      <input id="adminKey" placeholder="Admin key">
      <button class="btn primary" onclick="saveKey()">Save</button>
      <button class="btn ghost" onclick="clearKey()">Clear</button>
    </div>

    <div class="row" style="margin-top:12px;">
      <button class="btn primary" onclick="start()">Start</button>
      <button class="btn ghost" onclick="stop()">Stop</button>
    </div>

    <div class="cam" style="margin-top:12px;">
      <video id="video" playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const API_URL = "PASTE_YOUR_EXEC_URL_HERE";

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const statusEl = document.getElementById('status');

  let stream = null;
  let scanning = false;
  let rafId = null;

  let detector = null;
  if ('BarcodeDetector' in window) {
    try { detector = new BarcodeDetector({ formats: ['qr_code'] }); }
    catch(e){ detector = null; }
  }

  function esc(s){
    return String(s).replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
    );
  }

  function setStatus(html){ statusEl.innerHTML = html || ''; }

  function saveKey(){
    localStorage.setItem('tx_admin_key', document.getElementById('adminKey').value.trim());
    setStatus('<span class="good">Key saved</span>');
  }

  function clearKey(){
    localStorage.removeItem('tx_admin_key');
    document.getElementById('adminKey').value='';
    setStatus('<span class="muted">Key cleared</span>');
  }

  document.getElementById('adminKey').value =
    localStorage.getItem('tx_admin_key') || '';

  async function start(){
    stop();
    setStatus('<span class="muted">Requesting camera...</span>');

    try{
      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:"environment" },
          audio:false
        });
      }catch(e){
        stream = await navigator.mediaDevices.getUserMedia({
          video:true,
          audio:false
        });
      }

      video.srcObject = stream;
      await video.play();

      scanning = true;
      setStatus('<span class="good">Camera started</span>');
      tick();
    }catch(e){
      setStatus('<span class="bad">Camera error:</span> '+esc(e.name));
    }
  }

  function stop(){
    scanning=false;
    if(rafId) cancelAnimationFrame(rafId);
    if(stream){
      stream.getTracks().forEach(t=>t.stop());
      stream=null;
    }
  }

  async function tick(){
    if(!scanning) return;

    if(video.readyState<2){
      rafId=requestAnimationFrame(tick);
      return;
    }

    const w=video.videoWidth;
    const h=video.videoHeight;

    canvas.width=w;
    canvas.height=h;

    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0,w,h);

    let text=null;

    if(detector){
      try{
        const codes=await detector.detect(canvas);
        if(codes.length) text=codes[0].rawValue;
      }catch(_){}
    }

    if(!text){
      const img=ctx.getImageData(0,0,w,h);
      const code=jsQR(img.data,img.width,img.height);
      if(code) text=code.data;
    }

    if(text) sendUid(text.trim().toUpperCase());

    rafId=requestAnimationFrame(tick);
  }

  async function sendUid(uid){
    setStatus('<span class="muted">Sending '+esc(uid)+'...</span>');

    const res = await fetch(API_URL,{
      method:'POST',
      headers:{ 'Content-Type':'text/plain' }, // avoid preflight
      body: JSON.stringify({
        uid,
        adminKey: localStorage.getItem('tx_admin_key') || ''
      })
    });

    const data = await res.json();

    if(data.ok){
      setStatus('<span class="good">OK:</span> '+esc(uid)+' → stars: '+data.stars);
    }else{
      setStatus('<span class="bad">'+esc(data.code)+':</span> '+esc(data.message));
    }
  }
</script>

</body>
</html>
